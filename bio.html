<body>

    <!-- Nav -->

    <!-- Password Modal -->
    <div class="password-modal" id="passwordModal" role="dialog" aria-modal="true" aria-label="Access Required">

        </div>

                <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3">Night Raid</option>
                <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3">Cyber Chase</option>
                <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3">Digital Dreams</option>
            </select>
            <div class="music-controls">
                <button type="button" class="music-btn" data-action="play">Play</button>
                <button type="button" class="music-btn" data-action="mute">Mute</button>
                <button type="button" class="music-btn" data-action="prev">⏮ Prev</button>
                <button type="button" class="music-btn" data-action="next">Next ⏭</button>
            </div>
            <label class="music-control-label" for="volume-directory">Volume</label>
            <input id="volume-directory" class="music-volume" type="range" min="0" max="1" step="0.01" value="0.5">
            <div class="music-progress-container">
                <input type="range" class="music-progress" min="0" max="100" value="0" step="0.1" aria-label="Seek">
            </div>
            <p class="music-status" aria-live="polite">Click Play to start music</p>
            <div class="music-visualizer" aria-hidden="true">
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
            </div>
        </div>
    </div>

    <!-- Directory -->
    <div class="bio-directory">
        <div class="directory-container">
            <h1 class="directory-title">Players</h1>
            <p class="directory-subtitle">// Select Profile</p>

            <div class="user-cards">

                <!-- ORVANYX -->
                <a href="bio-orvanyx.html" class="user-card" style="animation-delay: 0.1s">

                    <div class="card-content">
                        <div class="user-avatar" style="background: linear-gradient(135deg, #ff006e 0%, #f72585 100%);">
                            Z
                        </div>
                        <h2 class="user-name">ZERO</h2>
                        <p class="user-handle">@zero</p>
                    </div>
                </a>

                <!--
                ====================================================
                ADD NEW USER CARDS HERE — see README.md for guide
                ====================================================
                -->

            </div>
        </div>
    </div>

    <script src="bio-music.js"></script>
    <script>
        // ── Secure password check via SHA-256 ───────────────────────────────
        // The raw password is NEVER stored in this file.
        // To change the password: compute sha256('YourNewPassword') and update HASH below.
        // Easy tool: https://emn178.github.io/online-tools/sha256.html
        //
        // Current password hash = sha256('Luffy')
        const HASH = 'b46e03d8c5e2cd59a947ba4266f611212fbe486cc94a132d120a6fde5ab0dbe6';

        async function sha256(str) {
            const buf = await crypto.subtle.digest(
                'SHA-256',
                new TextEncoder().encode(str)
            );
            return Array.from(new Uint8Array(buf))
                .map(b => b.toString(16).padStart(2, '0'))
                .join('');
        }

        const modal  = document.getElementById('passwordModal');
        const input  = document.getElementById('passwordInput');
        const submit = document.getElementById('passwordSubmit');
        const errEl  = document.getElementById('passwordError');

        // Show modal only if not already authenticated this session
        if (sessionStorage.getItem('bioAuth') !== 'true') {
            modal.style.display = 'flex';
            setTimeout(() => input.focus(), 100);
        }

        submit.addEventListener('click', checkPassword);
        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') checkPassword(); });

        async function checkPassword() {
            const typed = input.value;
            if (!typed) return;

            const hash = await sha256(typed);
            if (hash === HASH) {
                sessionStorage.setItem('bioAuth', 'true');
                modal.style.display = 'none';
                errEl.textContent = '';
            } else {
                errEl.textContent = 'Incorrect password! Try again, nakama…';
                input.value = '';
                input.classList.add('shake');
                setTimeout(() => input.classList.remove('shake'), 500);
                input.focus();
            }
        }
    </script>
</body>
</html>
